version: "3"
services:
  web:
    build: .
    image: masarakki/jfroxy
    restart: always
    environment:
      REDIS_URL: redis://redis:6379
    env_file:
      - .env.production
    ports:
      - "80:80"
    depends_on:
      - redis
  redis:
    image: redis:alpine@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
    restart: always
